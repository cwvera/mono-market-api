name: monomarket-prod

services:
  mongodb:
    build:
      context: ./docker/mongo
    container_name: mono-market-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: monomarket
    volumes:
      - mongodb_data_prod:/data/db
    networks:
      - monomarket

  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: mono-market-api
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDbSettings__ConnectionString: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/monomarket?authSource=admin
      MongoDbSettings__DatabaseName: monomarket
      SmtpSettings__Host: ${SMTP_HOST}
      SmtpSettings__Port: ${SMTP_PORT}
      SmtpSettings__EnableSsl: ${SMTP_ENABLE_SSL:-false}
      SmtpSettings__Username: ${SMTP_USERNAME}
      SmtpSettings__Password: ${SMTP_PASSWORD}
      SmtpSettings__FromAddress: ${SMTP_FROM_ADDRESS}
      SmtpSettings__FromName: ${SMTP_FROM_NAME:-MonoMarket}
    networks:
      - monomarket

networks:
  monomarket:

volumes:
  mongodb_data_prod:
