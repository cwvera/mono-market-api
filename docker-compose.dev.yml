name: monomarket-dev

services:
  mongodb:
    build:
      context: ./docker/mongo
    container_name: mono-market-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root12345
      MONGO_INITDB_DATABASE: monomarket
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db

volumes:
  mongodb_data_dev:
